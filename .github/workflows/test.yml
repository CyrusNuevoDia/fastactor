name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup[uv]
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: setup[python]
        run: uv python install 3.13

      - name: uv[sync]
        run: uv sync --locked

      - name: lint
        run: uv run ruff check src

      - name: format
        run: uv run ruff format --check src

      - name: test
        run: uv run pytest src
